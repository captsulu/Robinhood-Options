<div id="pane-logs" class="tab-pane hidden">

  <section class="section">
    <h2 class="section-title">Alert History</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Time</th>
            <th>Symbol</th>
            <th>Status</th>
            <th>Message</th>
            <th>Price</th>
            <th>Distance</th>
            <th>DTE</th>
          </tr>
        </thead>
        <tbody id="alertsBody">
          <tr><td colspan="7" class="empty-msg">No alerts yet</td></tr>
        </tbody>
      </table>
    </div>
  </section>

  <section class="section">
    <h2 class="section-title">
      Cash Snapshot History
      <button class="btn-sm" onclick="takeManualSnapshot()">📸 Take Snapshot</button>
    </h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Time</th>
            <th>Type</th>
            <th>Withdrawable</th>
            <th>Buying Power</th>
            <th>Cash</th>
            <th>Portfolio Equity</th>
          </tr>
        </thead>
        <tbody id="cashBody">
          <tr><td colspan="6" class="empty-msg">No snapshots yet</td></tr>
        </tbody>
      </table>
    </div>
  </section>

</div><!-- end pane-logs -->
