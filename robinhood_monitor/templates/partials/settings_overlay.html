<div id="settingsOverlay" class="settings-overlay hidden">
  <div class="settings-grid">
    <div class="settings-field">
      <label>
        <div class="tol-row">
          <span>Tolerance</span><span class="tol-val" id="tolValue">2.0%</span>
        </div>
      </label>
      <input type="range" id="tolSlider" min="0.5" max="20" step="0.5" value="2">
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:2px">
        <span>0.5%</span><span>20%</span>
      </div>
    </div>
    <div class="settings-field">
      <label>Days Before Expiry Warning</label>
      <input type="number" id="dteInput" min="1" max="30" value="3">
    </div>
    <div class="settings-field">
      <label>Scan Interval (minutes)</label>
      <input type="number" id="scanInput" min="1" max="60" value="5">
    </div>
    <div class="settings-field">
      <label>Email Alerts</label>
      <div class="toggle-wrap">
        <label class="toggle">
          <input type="checkbox" id="emailToggle">
          <span class="slider-toggle"></span>
        </label>
        <span class="toggle-label">Send email alerts</span>
      </div>
      <input type="email" id="emailAddr" placeholder="recipient@example.com" disabled>
    </div>
  </div>
  <div class="settings-actions">
    <button class="btn-primary" onclick="saveSettings()">💾 Save Settings</button>
    <button class="btn" onclick="toggleSettings()">Cancel</button>
  </div>
</div>
