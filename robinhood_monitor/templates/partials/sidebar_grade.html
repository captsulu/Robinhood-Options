<!-- ── Graham Grade Sidebar ────────────────────────────────────────── -->
<div class="gs-overlay" id="gsOverlay" onclick="closeGradeSidebar()"></div>
<div class="grade-sidebar" id="gradeSidebar">
  <div class="gs-header">
    <div class="gs-title">
      <div>
        <div class="gs-symbol" id="gsSymbolTitle">—</div>
        <div class="gs-name"   id="gsNameTitle"></div>
      </div>
      <div class="gs-grade-big grade-loading" id="gsGradeBig">—</div>
    </div>
    <button class="gs-close" onclick="closeGradeSidebar()">✕</button>
  </div>
  <div class="gs-body" id="gsSidebarBody">
    <p style="color:var(--muted);text-align:center;padding:40px 0;">Click a grade button to load.</p>
  </div>
</div>
