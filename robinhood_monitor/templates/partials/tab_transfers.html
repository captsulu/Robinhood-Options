<div id="pane-transfers" class="tab-pane hidden">
  <section class="section">
    <h2 class="section-title">
      Transfer History
      <button class="btn-sm" onclick="syncTransfers(this)">↻ Sync from Robinhood</button>
    </h2>
    <div class="table-wrap">
      <table class="transfers-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Direction</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Source</th>
            <th>Notes</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="xferBody">
          <tr><td colspan="7" class="empty-msg">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </section>
</div><!-- end pane-transfers -->
